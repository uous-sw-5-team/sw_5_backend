<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyPlanner | 스마트 대시보드</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .task-checked {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .thumbnail-hover {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            position: relative;
            z-index: 10;
        }
        .thumbnail-hover:hover {
            z-index: 9999 !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            transform: scale(3.5);
        }
        /* Remove arrows from number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .calendar-picker-overlay {
            display: none;
        }
        .calendar-picker-overlay.active {
            display: block;
        }
        #year-selector::-webkit-scrollbar {
            height: 4px;
        }
        #year-selector::-webkit-scrollbar-track {
            background: transparent;
        }
        #year-selector::-webkit-scrollbar-thumb {
            background: #e1e3e4;
            border-radius: 10px;
        }
        /* Pattern background */
        .dot-pattern {
            background-color: #fdfaf5;
            background-image: radial-gradient(#f1e6d8 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#031635",
                        "on-primary": "#ffffff",
                        "primary-container": "#e0e7ff",
                        "on-primary-container": "#031635",
                        "secondary": "#ffc1cc", /* Pastel Pink */
                        "on-secondary": "#191c1d",
                        "tertiary": "#fff9c4", /* Pastel Yellow */
                        "on-tertiary": "#191c1d",
                        "brand-blue": "#d1e3fa", /* Pastel Blue */
                        "on-brand-blue": "#031635",
                        "background": "#fdfaf5", /* Warm Cream */
                        "surface": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f9f6f1",
                        "surface-container": "#f1e6d8",
                        "outline": "#75777f",
                        "outline-variant": "#d1c7bc",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#44474e",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "unit": "8px",
                        "container-max-width": "1536px",
                        "gutter": "32px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter", "Pretendard", "sans-serif"],
                        "body-lg": ["Inter", "Pretendard", "sans-serif"],
                        "headline-lg": ["Inter", "Pretendard", "sans-serif"],
                        "title-md": ["Inter", "Pretendard", "sans-serif"],
                        "label-md": ["Inter", "Pretendard", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>
<body class="dot-pattern text-on-background font-body-lg overflow-x-hidden min-h-screen flex flex-col">
<!-- TopNavBar -->
<header class="bg-surface border-b border-outline-variant shadow-sm top-0 sticky z-[60]">
<div class="flex justify-between items-center w-full max-w-[1536px] px-margin-desktop mx-auto h-16">
<a class="flex items-center gap-3 hover:opacity-90 transition-opacity" href="index.html">
<img alt="StudyPlanner Logo" class="w-10 h-10 object-contain" src="logo.png"/>
<span class="font-display-lg text-[28px] font-bold text-primary">Study Planner</span>
</a>
<!-- Auth Container -->
<div class="flex gap-4" id="auth-container">
<!-- Logged Out State -->
<div class="flex gap-4" id="logged-out-view">
<a class="px-6 py-2 bg-brand-blue text-on-brand-blue rounded-lg font-bold text-sm hover:opacity-90 transition-all active:scale-95 shadow-sm border border-outline-variant/50 flex items-center justify-center" href="login.html">로그인</a>
<a class="px-6 py-2 bg-primary text-on-primary rounded-lg font-bold text-sm hover:opacity-90 transition-all active:scale-95 shadow-md border border-primary flex items-center justify-center" href="signup.html">회원가입</a>
</div>
<!-- Logged In State -->

<div class="flex items-center gap-2 px-3 py-1.5 bg-surface-container-low rounded-full border border-outline-variant/30">
<span class="material-symbols-outlined text-sm text-on-surface-variant">person</span>

</div>
<button class="px-4 py-2 text-on-surface-variant hover:text-error hover:bg-error/5 rounded-lg font-bold text-sm transition-all flex items-center gap-1.5" id="logout-btn">
<span class="material-symbols-outlined text-[18px]">logout</span> 로그아웃
                    </button>
</div>
</div>
</div>
</header>
<div class="w-full max-w-[1536px] mx-auto px-margin-desktop flex-grow flex flex-col">
<main class="flex-grow flex flex-col py-6">
<div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter flex-grow items-start h-full">
<!-- Left Column: Calendar -->
<section class="lg:col-span-8 bg-surface border border-outline-variant rounded-xl shadow-md p-6 xl:p-8 relative h-full flex flex-col" style="z-index: 50;">
<div class="flex items-center justify-between mb-8">
<div class="relative">
<h2 class="font-headline-lg text-3xl font-bold text-primary cursor-pointer hover:bg-surface-container-low px-3 py-1 rounded-lg transition-colors flex items-center gap-2" id="calendar-title-display">2024년 6월 <span class="material-symbols-outlined text-on-surface-variant text-sm">expand_more</span></h2>
<!-- Year/Month Picker Overlay -->
<div class="calendar-picker-overlay absolute top-full left-0 mt-3 bg-white border border-outline-variant rounded-2xl shadow-2xl z-[100] p-6 min-w-[320px] animate-in fade-in zoom-in-95 duration-200" id="date-picker-overlay">
<div class="flex flex-col gap-6">
<div>
<p class="text-xs font-bold text-primary mb-3 px-1 uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-sm">calendar_today</span> 연도 선택
                                        </p>
<div class="flex flex-row gap-2 overflow-x-auto pb-2 scroll-smooth" id="year-selector"></div>
</div>
<div>
<p class="text-xs font-bold text-primary mb-3 px-1 uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-sm">event</span> 월 선택
                                        </p>
<div class="grid grid-cols-4 gap-2" id="month-selector"></div>
</div>
</div>
</div>
</div>
<div class="flex gap-3">
<button class="p-2.5 bg-surface-container-low hover:bg-surface-container-high rounded-full transition-colors border border-outline-variant" id="prev-month-btn">
<span class="material-symbols-outlined text-on-surface-variant">chevron_left</span>
</button>
<button class="p-2.5 bg-surface-container-low hover:bg-surface-container-high rounded-full transition-colors border border-outline-variant" id="next-month-btn">
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>

<div class="grid grid-cols-7 gap-px bg-outline-variant rounded-xl border border-outline-variant flex-grow" id="calendar-grid">
<!-- Day Headers -->
<div class="bg-surface-container-low py-4 text-center font-bold text-error text-xs uppercase">일</div>
<div class="bg-surface-container-low py-4 text-center font-bold text-on-surface-variant/70 text-xs uppercase">월</div>
<div class="bg-surface-container-low py-4 text-center font-bold text-on-surface-variant/70 text-xs uppercase">화</div>
<div class="bg-surface-container-low py-4 text-center font-bold text-on-surface-variant/70 text-xs uppercase">수</div>
<div class="bg-surface-container-low py-4 text-center font-bold text-on-surface-variant/70 text-xs uppercase">목</div>
<div class="bg-surface-container-low py-4 text-center font-bold text-on-surface-variant/70 text-xs uppercase">금</div>
<div class="bg-surface-container-low py-4 text-center font-bold text-primary text-xs uppercase">토</div>
</div>
</section>
<!-- Right Column: Tasks -->
<section class="lg:col-span-4 flex flex-col gap-gutter h-full">
<div class="bg-surface border border-outline-variant rounded-xl shadow-md p-6 flex flex-col min-h-[500px]">
<div class="flex items-center justify-between mb-6">
<div class="flex flex-col gap-1">
<h3 class="font-bold text-xl text-primary" id="selected-date-title">6월 15일 할 일</h3>
<span class="bg-tertiary text-on-tertiary text-[11px] px-3 py-0.5 rounded-full font-bold w-fit shadow-sm border border-outline-variant/30" id="task-count-badge">0개 남음</span>
</div>
<button class="flex items-center gap-1.5 bg-primary text-on-primary px-4 py-2 rounded-lg font-bold text-sm hover:opacity-90 shadow-md border border-primary transition-all active:scale-95" id="add-task-btn">
<span class="material-symbols-outlined text-sm">add</span> 새 일정
                            </button>
</div>
<div class="space-y-4 flex-grow overflow-y-auto max-h-[400px] pr-2" id="task-list">
<!-- Tasks injected via script -->
</div>
<!-- Upload Photo Section -->
<div class="mt-6 animate-in fade-in slide-in-from-bottom-4 duration-500 hidden" id="upload-section">
<div class="p-5 border-2 border-dashed border-secondary bg-secondary/10 rounded-xl flex flex-col items-center gap-3 text-center">
<div class="w-10 h-10 bg-secondary rounded-full flex items-center justify-center text-on-secondary shadow-sm">
<span class="material-symbols-outlined">check_circle</span>
</div>
<div>
<p class="font-bold text-primary">모든 할 일을 완료했습니다!</p>
<p class="text-xs text-on-surface-variant">학습 노트 사진을 업로드하고 인증하세요.</p>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary px-6 py-2.5 rounded-lg font-bold text-sm hover:shadow-lg transition-all border border-primary">
<span class="material-symbols-outlined text-sm">upload</span> 사진 업로드
                                </button>
</div>
</div>
</div>
<!-- Progress Stats -->
<div class="bg-primary text-on-primary rounded-xl p-6 shadow-xl relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
<div class="flex justify-between items-center mb-4 relative z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary">bolt</span>
<p class="font-bold text-xs opacity-90 uppercase tracking-widest">오늘의 집중도</p>
</div>
<span class="font-bold text-2xl text-tertiary" id="concentration-text">0%</span>
</div>
<div class="h-4 w-full bg-white/10 rounded-full overflow-hidden relative z-10 border border-white/5">
<div class="h-full bg-secondary transition-all duration-1000 ease-out shadow-[0_0_12px_rgba(255,193,204,0.5)]" id="concentration-bar" style="width: 0%;"></div>
</div>
<p class="mt-4 font-medium text-sm text-white/80 relative z-10" id="concentration-msg">목표를 향해 달려볼까요?</p>
</div>
</section>
</div>

</div>
<script>
        // Auth Management Logic
        const loggedOutView = document.getElementById('logged-out-view');
        const loggedInView = document.getElementById('logged-in-view');
        const logoutBtn = document.getElementById('logout-btn');
        const userIdDisplay = document.getElementById('user-id-display');

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const userParam = urlParams.get('user');
            const storedUser = localStorage.getItem('study_user');
            const currentUser = userParam || storedUser;

            if (currentUser) {
                loggedOutView.classList.add('hidden');
                loggedInView.classList.remove('hidden');
                userIdDisplay.textContent = currentUser;
                if (!storedUser) localStorage.setItem('study_user', currentUser);
            } else {
                loggedOutView.classList.remove('hidden');
                loggedInView.classList.add('hidden');
            }
        }

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('study_user');
            checkAuth();
        });

        // State Management
        let currentYear = 2024;
        let currentMonth = 5; // June
        let selectedDate = 15;

        // In-memory database with initial sample data
        let taskDatabase = {
            "2024-06-15": [
                { id: 1, title: '역사 에세이 초안 작성', hour: 9, minute: 0, desc: '산업혁명의 영향에 관한 보고서의 초기 개요를 작성하세요.', completed: false, isEditing: false },
                { id: 2, title: '유기화학 복습', hour: 15, minute: 0, desc: '다가오는 퀴즈를 위해 탄소-탄소 결합 형성과 반응 메커니즘에 집중하세요.', completed: false, isEditing: false },
                { id: 3, title: '수학 퀴즈 연습', hour: 21, minute: 0, desc: '모의고사 세트 B를 완료하세요. 계산기 사용 금지.', completed: false, isEditing: false }
            ]
        };

        const calendarGrid = document.getElementById('calendar-grid');
        const calendarTitle = document.getElementById('calendar-title-display');
        const datePickerOverlay = document.getElementById('date-picker-overlay');
        const taskList = document.getElementById('task-list');
        const selectedDateTitle = document.getElementById('selected-date-title');
        const addTaskBtn = document.getElementById('add-task-btn');
        const taskCountBadge = document.getElementById('task-count-badge');
        const uploadSection = document.getElementById('upload-section');
        const concentrationText = document.getElementById('concentration-text');
        const concentrationBar = document.getElementById('concentration-bar');
        const concentrationMsg = document.getElementById('concentration-msg');

        function generateCalendar() {
            // Keep only headers
            const headers = Array.from(calendarGrid.children).slice(0, 7);
            calendarGrid.innerHTML = '';
            headers.forEach(h => calendarGrid.appendChild(h));

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            calendarTitle.innerHTML = `${currentYear}년 ${currentMonth + 1}월 <span class="material-symbols-outlined text-on-surface-variant text-sm">expand_more</span>`;

            // Empty cells for previous month padding
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = "bg-surface-container-low/50 min-h-[120px]";
                calendarGrid.appendChild(emptyCell);
            }

            // Days cells
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = document.createElement('div');
                const isSelected = (day === selectedDate);
                dayCell.className = `bg-white min-h-[120px] relative hover:bg-surface-container-low transition-all cursor-pointer group flex flex-col border-outline-variant ${isSelected ? 'ring-4 ring-inset ring-secondary/50 z-[25]' : 'z-auto'}`;
                dayCell.onclick = (event) => selectDate(day, event);

                // Mocking special events and images for specific dates as in the design
                const hasSpecial = (day === 12 || day === 24);
                const hasImage = (day === 15 || day === 18);
                const imageUrl = day === 15 ? 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&q=80&w=200&h=200' : 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&q=80&w=200&h=200';

                dayCell.innerHTML = `
                    <div class="flex items-start justify-between p-2 xl:p-3 pointer-events-none">
                        <span class="text-sm font-bold ${isSelected ? 'text-primary' : 'text-on-surface-variant group-hover:text-primary'} transition-colors">${day}</span>
                        ${hasSpecial ? `<span class="inline-block bg-tertiary text-[10px] px-2 py-0.5 rounded-full font-bold uppercase shadow-sm border border-outline-variant/20">모의고사</span>` : ''}
                    </div>
                    <div class="flex-grow w-full h-full flex items-center justify-center px-2 pb-2 pointer-events-none">
                        ${hasImage ? `
                            <img src="${imageUrl}" 
                                 class="w-full h-full max-h-[80px] rounded-lg object-cover border border-outline-variant shadow-sm thumbnail-hover pointer-events-auto"
                                 alt="공부">
                        ` : ''}
                    </div>
                `;
                calendarGrid.appendChild(dayCell);
            }
        }

        function initPicker() {
            const yearSelector = document.getElementById('year-selector');
            const monthSelector = document.getElementById('month-selector');
            
            yearSelector.innerHTML = '';
            for (let y = 2020; y <= 2030; y++) {
                const btn = document.createElement('button');
                const isActive = y === currentYear;
                btn.className = `flex-shrink-0 px-4 py-2 rounded-xl text-sm transition-all duration-200 border ${isActive ? 'bg-primary text-on-primary border-primary font-bold shadow-md' : 'bg-surface-container-low text-on-surface-variant border-outline-variant hover:bg-surface-container'}`;
                btn.textContent = `${y}년`;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    currentYear = y;
                    generateCalendar();
                    initPicker();
                    updateUI();
                };
                yearSelector.appendChild(btn);
            }

            monthSelector.innerHTML = '';
            for (let m = 0; m < 12; m++) {
                const btn = document.createElement('button');
                const isActive = m === currentMonth;
                btn.className = `px-3 py-2.5 rounded-xl text-sm transition-all duration-200 border ${isActive ? 'bg-secondary text-on-secondary border-secondary font-bold shadow-sm' : 'bg-surface-container-low text-on-surface-variant border-outline-variant hover:bg-surface-container'}`;
                btn.textContent = `${m + 1}월`;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    currentMonth = m;
                    generateCalendar();
                    initPicker();
                    updateUI();
                    datePickerOverlay.classList.remove('active');
                };
                monthSelector.appendChild(btn);
            }
        }

        calendarTitle.onclick = (e) => {
            e.stopPropagation();
            datePickerOverlay.classList.toggle('active');
        };

        document.addEventListener('click', (e) => {
            if (!datePickerOverlay.contains(e.target) && e.target !== calendarTitle) {
                datePickerOverlay.classList.remove('active');
            }
        });

        document.getElementById('prev-month-btn').onclick = () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            generateCalendar();
            initPicker();
            updateUI();
        };

        document.getElementById('next-month-btn').onclick = () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            generateCalendar();
            initPicker();
            updateUI();
        };

        function getTaskKey(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function selectDate(day, event) {
            selectedDate = day;
            selectedDateTitle.textContent = `${currentMonth + 1}월 ${day}일 할 일`;
            generateCalendar();
            updateUI();
        }

        function sortTasks(tasks) {
            return tasks.sort((a, b) => {
                const timeA = a.hour * 60 + (a.minute || 0);
                const timeB = b.hour * 60 + (b.minute || 0);
                return timeA - timeB;
            });
        }

        function updateUI() {
            const key = getTaskKey(currentYear, currentMonth, selectedDate);
            let tasks = taskDatabase[key] || [];
            tasks = sortTasks(tasks);

            taskList.innerHTML = '';
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-on-surface-variant/40">
                        <span class="material-symbols-outlined text-5xl mb-2">sticky_note_2</span>
                        <p class="font-bold text-sm">오늘의 일정이 없습니다.</p>
                    </div>
                `;
            } else {
                tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = "task-card p-4 border border-outline-variant rounded-xl bg-white hover:border-secondary hover:shadow-md transition-all group relative border-l-4 " + (task.completed ? 'border-l-secondary' : 'border-l-primary');
                    
                    if (task.isEditing) {
                        renderEditMode(card, task);
                    } else {
                        renderViewMode(card, task);
                    }
                    taskList.appendChild(card);
                });
            }

            const remaining = tasks.filter(t => !t.completed).length;
            taskCountBadge.textContent = tasks.length > 0 ? `${remaining}개 남음` : '남은 일정 없음';

            if (tasks.length > 0 && remaining === 0) {
                uploadSection.classList.remove('hidden');
            } else {
                uploadSection.classList.add('hidden');
            }

            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            let percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            concentrationText.textContent = `${percentage}%`;
            concentrationBar.style.width = `${percentage}%`;

            if (percentage === 0 && total > 0) {
                concentrationMsg.textContent = "목표를 향해 달려볼까요?";
            } else if (percentage < 50 && total > 0) {
                concentrationMsg.textContent = "시작이 반이에요. 조금만 더 힘내세요!";
            } else if (percentage < 100 && total > 0) {
                concentrationMsg.textContent = "잘하고 있어요! 거의 다 왔습니다.";
            } else if (percentage === 100 && total > 0) {
                concentrationMsg.textContent = "대단해요! 오늘의 모든 목표를 달성했습니다.";
            } else {
                concentrationMsg.textContent = "오늘의 계획을 세워보세요.";
            }
        }

        function renderViewMode(card, task) {
            const ampm = task.hour >= 12 ? '오후' : '오전';
            let displayH = task.hour % 12;
            if (displayH === 0) displayH = 12;
            const timeStr = `${ampm} ${String(displayH).padStart(2, '0')}:${String(task.minute || 0).padStart(2, '0')}`;

            card.innerHTML = `
                <div class="view-mode flex items-start gap-3">
                    <input class="mt-1 w-5 h-5 rounded-full border-outline text-primary focus:ring-primary transition-all cursor-pointer task-checkbox" 
                           type="checkbox" ${task.completed ? 'checked' : ''}>
                    <div class="flex-grow min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <h4 class="font-bold text-primary truncate ${task.completed ? 'task-checked' : ''}">${task.title || '제목 없음'}</h4>
                            <span class="text-[11px] font-bold text-on-surface-variant flex items-center gap-1 bg-surface-container-low px-2 py-0.5 rounded border border-outline-variant/30 whitespace-nowrap ml-2 shrink-0">
                                <span class="material-symbols-outlined text-[14px]">schedule</span> ${timeStr}
                            </span>
                        </div>
                        <p class="text-[12px] text-on-surface-variant line-clamp-2">${task.desc || '부가 내용이 없습니다.'}</p>
                    </div>
                    <button class="text-on-surface-variant hover:text-primary transition-colors p-1 edit-task-btn shrink-0">
                        <span class="material-symbols-outlined text-xl">edit</span>
                    </button>
                </div>
            `;

            card.querySelector('.task-checkbox').addEventListener('change', (e) => {
                task.completed = e.target.checked;
                updateUI();
            });

            card.querySelector('.edit-task-btn').addEventListener('click', () => {
                const key = getTaskKey(currentYear, currentMonth, selectedDate);
                taskDatabase[key].forEach(t => t.isEditing = false);
                task.isEditing = true;
                updateUI();
            });
        }

        function renderEditMode(card, task) {
            card.innerHTML = `
                <div class="edit-mode flex flex-col gap-3 w-full">
                    <div class="flex flex-col gap-2">
                        <input type="text" value="${task.title}" placeholder="일정 제목" class="font-bold text-primary bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 w-full task-title-input px-0">
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-1.5 text-on-surface-variant bg-surface-container-low px-2 py-1 rounded-lg border border-outline-variant/50 shrink-0">
                                <span class="material-symbols-outlined text-sm">schedule</span>
                                <div class="flex items-center gap-1 font-bold text-sm">
                                    <input type="number" min="0" max="23" value="${String(task.hour).padStart(2, '0')}" class="w-8 bg-transparent border-none p-0 text-center focus:ring-0 task-hour-input">
                                    <span>:</span>
                                    <input type="number" min="0" max="59" value="${String(task.minute || 0).padStart(2, '0')}" class="w-8 bg-transparent border-none p-0 text-center focus:ring-0 task-minute-input">
                                </div>
                            </div>
                        </div>
                    </div>
                    <textarea placeholder="상세 내용" rows="2" class="text-sm text-on-surface-variant bg-surface-container-lowest border border-outline-variant rounded-lg p-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary w-full resize-none task-desc-input">${task.desc || ''}</textarea>
                    <div class="flex justify-end gap-2">
                         <button class="px-4 py-1.5 bg-primary text-on-primary rounded-lg text-xs font-bold confirm-task-btn shadow-md border border-primary">저장</button>
                         <button class="px-3 py-1.5 text-error hover:bg-error/5 rounded-lg text-xs font-bold delete-task-btn border border-transparent hover:border-error/20">삭제</button>
                    </div>
                </div>
            `;

            const titleInp = card.querySelector('.task-title-input');
            const hourInp = card.querySelector('.task-hour-input');
            const minInp = card.querySelector('.task-minute-input');
            const descInp = card.querySelector('.task-desc-input');

            const save = () => {
                const key = getTaskKey(currentYear, currentMonth, selectedDate);
                task.title = titleInp.value.trim() || '제목 없음';
                let h = parseInt(hourInp.value);
                let m = parseInt(minInp.value);
                task.hour = (!isNaN(h)) ? Math.min(23, Math.max(0, h)) : 9;
                task.minute = (!isNaN(m)) ? Math.min(59, Math.max(0, m)) : 0;
                task.desc = descInp.value.trim();
                task.isEditing = false;
                taskDatabase[key] = sortTasks(taskDatabase[key]);
                updateUI();
            };

            card.querySelector('.confirm-task-btn').addEventListener('click', save);
            card.querySelector('.delete-task-btn').addEventListener('click', () => {
                const key = getTaskKey(currentYear, currentMonth, selectedDate);
                taskDatabase[key] = taskDatabase[key].filter(t => t.id !== task.id);
                updateUI();
            });
            titleInp.focus();
        }

        addTaskBtn.addEventListener('click', () => {
            const key = getTaskKey(currentYear, currentMonth, selectedDate);
            if (!taskDatabase[key]) taskDatabase[key] = [];
            taskDatabase[key].forEach(t => t.isEditing = false);
            const newTask = { id: Date.now(), title: '', hour: 9, minute: 0, desc: '', completed: false, isEditing: true };
            taskDatabase[key].push(newTask);
            updateUI();
        });

        // Initialize on Load
        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            generateCalendar();
            initPicker();
            updateUI();
        });
    </script>
</body></html>
